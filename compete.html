<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compete - SmartClass Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .badge-container { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
        .badge { background: var(--bg-card); padding: 12px 20px; border-radius: 30px; display: flex; align-items: center; gap: 10px; border: 1px solid var(--border); }
        .leaderboard { background: var(--bg-card); border-radius: 16px; overflow: hidden; border: 1px solid var(--border); }
        .leaderboard-item { display: flex; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--border); transition: all 0.3s; }
        .leaderboard-item:hover { background: var(--bg-hover); }
        .rank { width: 60px; font-size: 28px; font-weight: 700; }
        .rank-1 { color: #F59E0B; }
        .rank-2 { color: #9CA3AF; }
        .rank-3 { color: #CD7F32; }
        .student-avatar { width: 48px; height: 48px; background: rgba(255,102,0,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 16px; }
        .student-info { flex: 1; }
        .student-name { font-weight: 600; }
        .student-class { font-size: 12px; color: var(--text-dim); }
        .score { font-size: 24px; font-weight: 700; color: var(--accent-primary); }
        .class-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .class-card { background: var(--bg-card); border-radius: 16px; padding: 16px; border: 1px solid var(--border); }
        .class-card h4 { margin-bottom: 12px; color: var(--accent-primary); }
        .class-stat { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
        @media (max-width: 768px) { .leaderboard-item { flex-wrap: wrap; gap: 12px; } .rank { width: 40px; } }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar" id="sidebar">[... same sidebar ...]</aside>

    <main class="main-content">
        <header class="top-header">[... same header ...]</header>

        <div class="section">
            <div class="section-header">
                <h2><i class="fas fa-trophy"></i> Competition Mode</h2>
                <select id="termSelect" class="search-input" style="width: auto;"><option value="1">Term 1</option><option value="2">Term 2</option><option value="3" selected>Term 3</option></select>
            </div>

            <div class="badge-container" id="badgeContainer"></div>

            <h3><i class="fas fa-crown"></i> Overall Leaderboard</h3>
            <div class="leaderboard" id="overallLeaderboard"></div>

            <h3 style="margin-top: 32px;"><i class="fas fa-chart-simple"></i> Class Competition</h3>
            <div class="class-grid" id="classLeaderboard"></div>
        </div>
    </main>
</div>

<script>
    let allStudents = [], allClasses = [];

    function loadData() {
        allClasses = JSON.parse(localStorage.getItem('classes') || '[]');
        allStudents = JSON.parse(localStorage.getItem('students') || '[]');
        if (allClasses.length === 0) allClasses = [{ id: "cls_001", name: "Physics S4A" }, { id: "cls_002", name: "Physics S3B" }];
        if (allStudents.length === 0) allStudents = [
            { name: "UWAMAHORO Eric", classId: "cls_001", term1: 82, term2: 88, term3: 94 },
            { name: "IRADUKUNDA Diane", classId: "cls_001", term1: 85, term2: 89, term3: 91 },
            { name: "MUKAMANA Grace", classId: "cls_001", term1: 45, term2: 58, term3: 71 }
        ];
        displayLeaderboards();
    }

    function displayLeaderboards() {
        const term = document.getElementById('termSelect').value;
        const studentsWithScore = allStudents.map(s => ({ ...s, score: s[`term${term}`] || 0, className: allClasses.find(c => c.id === s.classId)?.name || 'Unknown' }));
        const sorted = studentsWithScore.sort((a,b) => b.score - a.score);
        
        const overallHtml = sorted.slice(0, 10).map((s, i) => {
            let rankIcon = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i+1}`;
            let rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
            return `<div class="leaderboard-item">
                <div class="rank ${rankClass}">${rankIcon}</div>
                <div class="student-avatar"><i class="fas fa-user-graduate"></i></div>
                <div class="student-info"><div class="student-name">${s.name}</div><div class="student-class">${s.className}</div></div>
                <div class="score">${s.score}%</div>
            </div>`;
        }).join('');
        document.getElementById('overallLeaderboard').innerHTML = overallHtml || '<div style="padding:40px;text-align:center;">No data</div>';
        
        const classStats = allClasses.map(cls => {
            const students = studentsWithScore.filter(s => s.classId === cls.id);
            const avg = students.reduce((a,b) => a + b.score, 0) / (students.length || 1);
            const top = students.sort((a,b) => b.score - a.score)[0];
            return { ...cls, avg: avg.toFixed(1), topStudent: top?.name || 'N/A', topScore: top?.score || 0, count: students.length };
        }).sort((a,b) => b.avg - a.avg);
        
        const classHtml = classStats.map(cls => `<div class="class-card"><h4>${cls.name}</h4>
            <div class="class-stat"><strong>Average:</strong> ${cls.avg}%</div>
            <div class="class-stat"><strong>Top Student:</strong> ${cls.topStudent} (${cls.topScore}%)</div>
            <div class="class-stat"><strong>Students:</strong> ${cls.count}</div>
        </div>`).join('');
        document.getElementById('classLeaderboard').innerHTML = classHtml;
        
        document.getElementById('badgeContainer').innerHTML = `
            <div class="badge"><i class="fas fa-trophy"></i> Highest: ${sorted[0]?.name || 'N/A'} (${sorted[0]?.score || 0}%)</div>
            <div class="badge"><i class="fas fa-chart-line"></i> Classes: ${allClasses.length}</div>
            <div class="badge"><i class="fas fa-users"></i> Students: ${allStudents.length}</div>
        `;
    }

    function checkAuth() { if (!localStorage.getItem('teacherToken') && !window.location.pathname.includes('index.html')) { window.location.href = 'index.html'; return false; } return true; }

    document.addEventListener('DOMContentLoaded', () => {
        if (!checkAuth()) return;
        loadData();
        document.getElementById('termSelect')?.addEventListener('change', displayLeaderboards);
        document.getElementById('logoutBtn')?.addEventListener('click', () => { localStorage.clear(); window.location.href = 'index.html'; });
    });
</script>
</body>
</html>
