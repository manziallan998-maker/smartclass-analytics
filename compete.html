<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compete - SmartClass Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .leaderboard { background: var(--bg-card); border-radius: 16px; overflow: hidden; border: 1px solid var(--border); }
        .leaderboard-item { display: flex; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--border); transition: all 0.3s; }
        .leaderboard-item:hover { background: var(--bg-hover); }
        .rank { width: 50px; font-size: 24px; font-weight: 700; }
        .rank-1 { color: #F59E0B; }
        .rank-2 { color: #9CA3AF; }
        .rank-3 { color: #CD7F32; }
        .student-avatar { width: 48px; height: 48px; background: rgba(255,102,0,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 16px; }
        .student-info { flex: 1; }
        .student-name { font-weight: 600; margin-bottom: 4px; }
        .student-class { font-size: 12px; color: var(--text-dim); }
        .score { font-size: 20px; font-weight: 700; color: var(--accent-primary); }
        .badge-container { display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
        .badge { background: var(--bg-card); padding: 8px 16px; border-radius: 20px; display: flex; align-items: center; gap: 8px; font-size: 12px; border: 1px solid var(--border); }
        .class-leaderboard { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .class-card { background: var(--bg-card); border-radius: 16px; padding: 16px; border: 1px solid var(--border); }
        .class-card h4 { margin-bottom: 12px; color: var(--accent-primary); }
        .class-student { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar" id="sidebar">[... same sidebar ...]</aside>

    <main class="main-content">
        <header class="top-header">[... same header ...]</header>

        <div class="section">
            <div class="section-header">
                <h2><i class="fas fa-trophy"></i> Competition Mode</h2>
                <select id="termSelectCompete" class="search-input" style="width: auto;"><option value="1">Term 1</option><option value="2">Term 2</option><option value="3" selected>Term 3</option></select>
            </div>

            <div class="badge-container" id="badgeContainer"></div>

            <h3 style="margin: 24px 0 16px;"><i class="fas fa-crown"></i> Overall School Leaderboard</h3>
            <div class="leaderboard" id="overallLeaderboard"></div>

            <h3 style="margin: 32px 0 16px;"><i class="fas fa-chart-simple"></i> Class Competition</h3>
            <div class="class-leaderboard" id="classLeaderboard"></div>
        </div>
    </main>
</div>

<script src="js/auth.js"></script>
<script src="js/theme.js"></script>
<script src="js/storage.js"></script>
<script src="js/app.js"></script>
<script>
    let allStudentsData = [];
    let classesData = [];

    document.addEventListener('DOMContentLoaded', () => {
        loadData();
        document.getElementById('termSelectCompete')?.addEventListener('change', () => loadData());
    });

    function loadData() {
        const term = document.getElementById('termSelectCompete').value;
        classesData = storage.getClasses();
        allStudentsData = [];
        
        for (const cls of classesData) {
            const students = storage.getStudents(cls.id);
            students.forEach(s => {
                s.className = cls.name;
                s.classId = cls.id;
                s.score = s[`term${term}`] || 0;
                allStudentsData.push(s);
            });
        }
        displayLeaderboards(term);
    }

    function displayLeaderboards(term) {
        const sortedStudents = [...allStudentsData].sort((a,b) => b.score - a.score);
        
        const overallHtml = sortedStudents.slice(0, 10).map((student, index) => {
            let rankClass = '', rankIcon = '';
            if (index === 0) { rankClass = 'rank-1'; rankIcon = '🥇'; }
            else if (index === 1) { rankClass = 'rank-2'; rankIcon = '🥈'; }
            else if (index === 2) { rankClass = 'rank-3'; rankIcon = '🥉'; }
            else { rankIcon = `${index + 1}`; }
            return `<div class="leaderboard-item">
                <div class="rank ${rankClass}">${rankIcon}</div>
                <div class="student-avatar"><i class="fas fa-user-graduate"></i></div>
                <div class="student-info"><div class="student-name">${student.name}</div><div class="student-class">${student.className}</div></div>
                <div class="score">${student.score}%</div>
            </div>`;
        }).join('');
        document.getElementById('overallLeaderboard').innerHTML = overallHtml || '<div style="padding:40px;text-align:center;">No data available</div>';
        
        const classStats = classesData.map(cls => {
            const classStudents = allStudentsData.filter(s => s.className === cls.name);
            const avgScore = classStudents.reduce((a,b) => a + b.score, 0) / (classStudents.length || 1);
            const topStudent = classStudents.sort((a,b) => b.score - a.score)[0];
            const topStudentsList = classStudents.sort((a,b) => b.score - a.score).slice(0, 3);
            return { ...cls, avgScore, topStudent, topStudentsList };
        }).sort((a,b) => b.avgScore - a.avgScore);
        
        const classHtml = classStats.map((cls, idx) => `
            <div class="class-card"><h4>${idx === 0 ? '🏆 ' : ''}${cls.name}</h4>
            <div class="class-student"><strong>Class Average:</strong> ${cls.avgScore.toFixed(1)}%</div>
            <div class="class-student"><strong>Top Student:</strong> ${cls.topStudent?.name || 'N/A'} (${cls.topStudent?.score || 0}%)</div>
            <div style="margin-top:8px;"><strong>Top 3:</strong></div>
            ${cls.topStudentsList.map((s,i) => `<div class="class-student">${i+1}. ${s.name} - ${s.score}%</div>`).join('')}
            </div>
        `).join('');
        document.getElementById('classLeaderboard').innerHTML = classHtml;
        
        const badges = [
            { icon: 'fa-trophy', text: 'Highest Score', condition: sortedStudents[0]?.name, value: sortedStudents[0]?.score },
            { icon: 'fa-chart-line', text: 'Most Improved', condition: 'MUKAMANA Grace', value: '+26%' },
            { icon: 'fa-star', text: 'Perfect Attendance', condition: '5 students', value: '' }
        ];
        document.getElementById('badgeContainer').innerHTML = badges.map(b => `<div class="badge"><i class="fas ${b.icon}"></i> ${b.text}: ${b.condition} ${b.value ? `(${b.value})` : ''}</div>`).join('');
    }
</script>
</body>
</html>
