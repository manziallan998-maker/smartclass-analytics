<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timetable - SmartClass Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .timetable-container { background: var(--bg-card); border-radius: 16px; overflow-x: auto; margin-top: 20px; border: 1px solid var(--border); }
        .timetable { width: 100%; border-collapse: collapse; min-width: 800px; }
        .timetable th, .timetable td { border: 1px solid var(--border); padding: 12px; text-align: center; vertical-align: top; }
        .timetable th { background: var(--bg-secondary); color: var(--accent-primary); }
        .time-slot { background: var(--bg-secondary); font-weight: 600; width: 80px; }
        .lesson-card { background: rgba(255,102,0,0.1); border-left: 3px solid var(--accent-primary); padding: 8px; margin: 4px 0; border-radius: 8px; font-size: 12px; cursor: pointer; transition: all 0.3s; }
        .lesson-card:hover { background: rgba(255,102,0,0.2); transform: translateX(-2px); }
        .lesson-class { font-weight: 600; margin-bottom: 4px; }
        .lesson-time { font-size: 10px; color: var(--text-dim); }
        .current-lesson-highlight { background: rgba(255,102,0,0.2); position: relative; }
        .export-buttons { display: flex; gap: 12px; margin-bottom: 20px; }
        .week-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        @media (max-width: 768px) { .week-nav { flex-direction: column; gap: 12px; } }
    </style>
</head>
<body>
        <!-- ==================== SIDEBAR & HEADER ==================== -->
    <style>
        /* Sidebar and Header Styles - Add if missing */
        .app-container {
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 280px;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            z-index: 100;
            transition: transform 0.3s ease;
            border-right: 1px solid #222222;
        }
        .sidebar.collapsed { transform: translateX(-280px); }
        .sidebar-header { padding: 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222222; }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 700; color: #FF6600; }
        .close-sidebar { background: none; border: none; color: #666; cursor: pointer; font-size: 20px; }
        .sidebar-nav { flex: 1; padding: 24px 16px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; margin-bottom: 4px; color: #ccc; text-decoration: none; border-radius: 12px; transition: all 0.3s; }
        .nav-item:hover { background: rgba(255, 102, 0, 0.1); color: #FF6600; }
        .nav-item.active { background: rgba(255, 102, 0, 0.15); color: #FF6600; border-left: 3px solid #FF6600; }
        .sidebar-footer { padding: 20px; border-top: 1px solid #222; }
        .teacher-info { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .avatar { width: 40px; height: 40px; background: rgba(255,102,0,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #FF6600; }
        .info .name { font-weight: 600; font-size: 14px; }
        .info .email { font-size: 12px; color: #666; }
        .logout-btn { width: 100%; padding: 10px; background: rgba(239,68,68,0.1); border: 1px solid #EF4444; border-radius: 8px; color: #EF4444; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; }
        .logout-btn:hover { background: #EF4444; color: white; }
        .main-content { flex: 1; margin-left: 280px; transition: margin-left 0.3s ease; min-height: 100vh; }
        .main-content.expanded { margin-left: 0; }
        .top-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 32px; background: #0a0a0a; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 50; }
        .menu-toggle { background: none; border: none; color: white; font-size: 24px; cursor: pointer; display: none; }
        .header-title h1 { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
        .header-title p { color: #888; font-size: 14px; }
        .header-actions { display: flex; align-items: center; gap: 16px; }
        .notifications-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; position: relative; }
        .notifications-btn .badge { position: absolute; top: 0; right: 0; background: #EF4444; font-size: 10px; padding: 2px 6px; border-radius: 10px; }
        .theme-toggle button { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-280px); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .menu-toggle { display: block; }
            .top-header { padding: 12px 16px; }
            .header-title h1 { font-size: 18px; }
        }
        body.light-theme .sidebar { background: #fff; border-right-color: #ddd; }
        body.light-theme .nav-item { color: #333; }
        body.light-theme .top-header { background: #fff; border-bottom-color: #ddd; }
        body.light-theme .top-header h1, body.light-theme .top-header p { color: #333; }
    </style>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo"><i class="fas fa-chalkboard-user"></i><span>SMARTCLASS</span></div>
                <button class="close-sidebar" id="closeSidebar"><i class="fas fa-times"></i></button>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>Dashboard</span></a>
                <a href="classes.html" class="nav-item"><i class="fas fa-book"></i><span>Classes</span></a>
                <a href="groups.html" class="nav-item"><i class="fas fa-users"></i><span>Smart Groups</span></a>
                <a href="analytics.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Analytics</span></a>
                <a href="predict.html" class="nav-item"><i class="fas fa-brain"></i><span>Predict</span></a>
                <a href="lesson-planner.html" class="nav-item"><i class="fas fa-calendar-alt"></i><span>Lesson Planner</span></a>
                <a href="timetable.html" class="nav-item"><i class="fas fa-clock"></i><span>Timetable</span></a>
                <a href="reports.html" class="nav-item"><i class="fas fa-file-alt"></i><span>Reports</span></a>
                <a href="compete.html" class="nav-item"><i class="fas fa-trophy"></i><span>Compete</span></a>
                <a href="backup.html" class="nav-item"><i class="fas fa-database"></i><span>Backup</span></a>
                <a href="settings.html" class="nav-item"><i class="fas fa-cog"></i><span>Settings</span></a>
                <a href="help.html" class="nav-item"><i class="fas fa-question-circle"></i><span>Help</span></a>
            </nav>
            <div class="sidebar-footer">
                <div class="teacher-info">
                    <div class="avatar"><i class="fas fa-user"></i></div>
                    <div class="info">
                        <p class="name" id="teacherName">Teacher</p>
                        <p class="email" id="teacherEmail">teacher@school.rw</p>
                    </div>
                </div>
                <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i><span>Logout</span></button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Header -->
            <header class="top-header">
                <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
                <div class="header-title">
                    <h1 id="pageTitle">SmartClass Analytics</h1>
                    <p id="pageSubtitle">Teacher Management System</p>
                </div>
                <div class="header-actions">
                    <div class="notifications-wrapper">
                        <button class="notifications-btn" id="notificationsBtn">
                            <i class="fas fa-bell"></i>
                            <span class="badge" id="notificationBadge">3</span>
                        </button>
                    </div>
                    <div class="theme-toggle">
                        <button id="themeToggle"><i class="fas fa-moon"></i></button>
                    </div>
                </div>
            </header>

            <!-- YOUR PAGE CONTENT GOES HERE -->
            <div id="pageContent">
                <!-- The existing content of your page will be moved here -->
            </div>
        </main>
    </div>

    <script>
        // ==================== SIDEBAR & HEADER FUNCTIONALITY ====================
        
        // Set active nav item based on current page
        function setActiveNav() {
            const currentPage = window.location.pathname.split('/').pop();
            document.querySelectorAll('.nav-item').forEach(item => {
                const href = item.getAttribute('href');
                if (href === currentPage || (currentPage === '' && href === 'dashboard.html')) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }
        
        // Set page title
        function setPageTitle() {
            const currentPage = window.location.pathname.split('/').pop();
            const titles = {
                'dashboard.html': { title: 'Dashboard', subtitle: 'Overview of your classes' },
                'classes.html': { title: 'Classes', subtitle: 'Manage your classes and students' },
                'groups.html': { title: 'Smart Groups', subtitle: 'Create balanced study groups' },
                'analytics.html': { title: 'Analytics', subtitle: 'Performance analysis' },
                'predict.html': { title: 'Predictive Insights', subtitle: 'AI-powered predictions' },
                'lesson-planner.html': { title: 'Lesson Planner', subtitle: 'Schedule your lessons' },
                'timetable.html': { title: 'Timetable', subtitle: 'Weekly schedule view' },
                'reports.html': { title: 'Reports', subtitle: 'Generate official reports' },
                'compete.html': { title: 'Competition', subtitle: 'Leaderboards & achievements' },
                'backup.html': { title: 'Backup', subtitle: 'Protect your data' },
                'settings.html': { title: 'Settings', subtitle: 'Customize your experience' },
                'help.html': { title: 'Help', subtitle: 'Guides & support' }
            };
            const pageInfo = titles[currentPage] || titles['dashboard.html'];
            const titleEl = document.getElementById('pageTitle');
            const subtitleEl = document.getElementById('pageSubtitle');
            if (titleEl) titleEl.textContent = pageInfo.title;
            if (subtitleEl) subtitleEl.textContent = pageInfo.subtitle;
        }
        
        // Load teacher info
        function loadTeacherInfo() {
            const teacherName = localStorage.getItem('teacherName');
            const teacherEmail = localStorage.getItem('teacherEmail');
            if (teacherName) {
                document.querySelectorAll('#teacherName').forEach(el => { if (el) el.textContent = teacherName; });
            }
            if (teacherEmail) {
                document.querySelectorAll('#teacherEmail').forEach(el => { if (el) el.textContent = teacherEmail; });
            }
        }
        
        // Logout function
        function logout() {
            localStorage.removeItem('teacherToken');
            localStorage.removeItem('teacherName');
            localStorage.removeItem('teacherEmail');
            window.location.href = 'index.html';
        }
        
        // Theme toggle
        function initTheme() {
            const isDark = localStorage.getItem('theme') !== 'light';
            if (!isDark) document.body.classList.add('light-theme');
            const themeBtn = document.getElementById('themeToggle');
            if (themeBtn) {
                themeBtn.addEventListener('click', () => {
                    document.body.classList.toggle('light-theme');
                    localStorage.setItem('theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
                });
            }
        }
        
        // Sidebar toggle for mobile
        function initSidebarToggle() {
            const menuToggle = document.getElementById('menuToggle');
            const closeSidebar = document.getElementById('closeSidebar');
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.querySelector('.main-content');
            
            if (menuToggle) {
                menuToggle.addEventListener('click', () => {
                    sidebar.classList.toggle('open');
                });
            }
            if (closeSidebar) {
                closeSidebar.addEventListener('click', () => {
                    sidebar.classList.remove('open');
                    if (window.innerWidth > 768) {
                        sidebar.classList.add('collapsed');
                        mainContent.classList.add('expanded');
                    }
                });
            }
        }
        
        // Notifications
        function initNotifications() {
            const notifBtn = document.getElementById('notificationsBtn');
            if (notifBtn) {
                notifBtn.addEventListener('click', () => {
                    alert('📋 Notifications:\n\n• Check your classes\n• Update student marks\n• Generate reports');
                });
            }
        }
        
        // Check authentication
        function checkAuth() {
            const token = localStorage.getItem('teacherToken');
            if (!token && !window.location.pathname.includes('index.html')) {
                window.location.href = 'index.html';
                return false;
            }
            return true;
        }
        
        // Initialize everything
        document.addEventListener('DOMContentLoaded', () => {
            if (!checkAuth()) return;
            setActiveNav();
            setPageTitle();
            loadTeacherInfo();
            initTheme();
            initSidebarToggle();
            initNotifications();
            
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) logoutBtn.addEventListener('click', logout);
        });
    </script>
</body>
</html>

<div class="app-container">
   
        <div class="section">
            <div class="section-header">
                <h2><i class="fas fa-calendar-week"></i> Weekly Timetable</h2>
                <div class="export-buttons">
                    <button class="btn-secondary" id="exportExcelBtn"><i class="fas fa-file-excel"></i> Excel</button>
                    <button class="btn-secondary" id="printBtn"><i class="fas fa-print"></i> Print</button>
                </div>
            </div>

            <div class="week-nav">
                <button class="btn-secondary" id="prevWeekBtn"><i class="fas fa-chevron-left"></i> Previous Week</button>
                <span id="currentWeekDisplay" style="font-weight: 600;">Week of May 25, 2026</span>
                <button class="btn-secondary" id="nextWeekBtn">Next Week <i class="fas fa-chevron-right"></i></button>
            </div>

            <div class="timetable-container">
                <table class="timetable" id="timetable">
                    <thead><tr id="timetableHeader"></tr></thead>
                    <tbody id="timetableBody"></tbody>
                </table>
            </div>

            <div class="legend" style="margin-top:20px; display:flex; gap:20px; flex-wrap:wrap; padding:16px; background:var(--bg-card); border-radius:12px;">
                <span><i class="fas fa-circle" style="color:#10B981;"></i> Current Lesson</span>
                <span><i class="fas fa-circle" style="color:var(--accent-primary);"></i> Upcoming</span>
                <span><i class="fas fa-circle" style="color:var(--text-dim);"></i> Completed</span>
            </div>
        </div>
    </main>
</div>

<script>
    let currentWeekOffset = 0;
    let timetableData = {};
    const timeSlots = ['07:00', '08:00', '09:00', '10:00', '11:00', '12:00', '13:00', '14:00', '15:00', '16:00', '17:00'];
    const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
    let lessonPlans = [];

    function loadTimetable() {
        lessonPlans = JSON.parse(localStorage.getItem('lessonPlans') || '[]');
        if (lessonPlans.length === 0) {
            lessonPlans = [
                { id: "lp_001", className: "Physics S4A", day: "Monday", startTime: "08:00", duration: 60 },
                { id: "lp_002", className: "Physics S3B", day: "Monday", startTime: "10:00", duration: 60 },
                { id: "lp_003", className: "Physics S4A", day: "Tuesday", startTime: "08:00", duration: 60 },
                { id: "lp_004", className: "Physics S2A", day: "Wednesday", startTime: "14:00", duration: 60 },
                { id: "lp_005", className: "Physics S3A", day: "Thursday", startTime: "09:00", duration: 60 },
                { id: "lp_006", className: "Physics S4A", day: "Friday", startTime: "08:00", duration: 60 }
            ];
        }
        processTimetableData();
    }

    function processTimetableData() {
        timetableData = {};
        for (const day of days) { timetableData[day] = {}; for (const slot of timeSlots) { timetableData[day][slot] = []; } }
        for (const lesson of lessonPlans) {
            const hour = parseInt(lesson.startTime.split(':')[0]);
            const slot = `${hour.toString().padStart(2,'0')}:00`;
            if (timetableData[lesson.day] && timetableData[lesson.day][slot]) {
                timetableData[lesson.day][slot].push(lesson);
            }
        }
        renderTimetable();
    }

    function renderTimetable() {
        const headerRow = document.getElementById('timetableHeader');
        headerRow.innerHTML = `<th class="time-slot">Time</th>${days.map(day => `<th>${day}</th>`).join('')}`;
        
        const tbody = document.getElementById('timetableBody');
        const now = new Date();
        const currentHour = now.getHours();
        const currentDay = days[now.getDay() - 1];
        
        tbody.innerHTML = timeSlots.map(slot => {
            const isCurrentHour = parseInt(slot.split(':')[0]) === currentHour;
            return `<tr>
                <td class="time-slot" style="${isCurrentHour ? 'background: rgba(255,102,0,0.2);' : ''}">${slot}</td>
                ${days.map(day => {
                    const lessons = timetableData[day]?.[slot] || [];
                    const isCurrent = (day === currentDay && isCurrentHour && lessons.length > 0);
                    return `<td class="${isCurrent ? 'current-lesson-highlight' : ''}">
                        ${lessons.map(l => `<div class="lesson-card" onclick="showLesson('${l.className}', '${l.startTime}', ${l.duration})">
                            <div class="lesson-class">${l.className}</div>
                            <div class="lesson-time">${l.startTime} (${l.duration}min)</div>
                        </div>`).join('')}
                        ${lessons.length === 0 ? '<div style="color:var(--text-dim); font-size:12px;">—</div>' : ''}
                    </td>`;
                }).join('')}
            </tr>`;
        }).join('');
    }

    function showLesson(className, time, duration) {
        const endHour = parseInt(time.split(':')[0]) + Math.floor((parseInt(time.split(':')[1]) + duration) / 60);
        const endMin = (parseInt(time.split(':')[1]) + duration) % 60;
        alert(`📖 ${className}\n⏰ ${time} - ${endHour.toString().padStart(2,'0')}:${endMin.toString().padStart(2,'0')}\n⏱️ ${duration} minutes`);
    }

    function exportToExcel() {
        let csv = "Time," + days.join(",") + "\n";
        for (const slot of timeSlots) {
            let row = slot;
            for (const day of days) {
                const lessons = timetableData[day]?.[slot] || [];
                row += `,"${lessons.map(l => l.className).join('; ') || '-'}"`;
            }
            csv += row + "\n";
        }
        const blob = new Blob([csv], { type: 'text/csv' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `timetable_week_${currentWeekOffset}.csv`;
        link.click();
        alert('Timetable exported!');
    }

    function updateWeekDisplay() {
        const now = new Date();
        const monday = new Date(now);
        monday.setDate(now.getDate() - now.getDay() + 1 + (currentWeekOffset * 7));
        const format = d => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        document.getElementById('currentWeekDisplay').innerHTML = `Week of ${format(monday)} - ${format(new Date(monday.getTime() + 4*86400000))}`;
    }

    function checkAuth() {
        if (!localStorage.getItem('teacherToken') && !window.location.pathname.includes('index.html')) {
            window.location.href = 'index.html';
            return false;
        }
        const name = localStorage.getItem('teacherName');
        if (name) document.querySelectorAll('#teacherName').forEach(el => { if (el) el.textContent = name; });
        return true;
    }

    document.addEventListener('DOMContentLoaded', () => {
        if (!checkAuth()) return;
        loadTimetable();
        updateWeekDisplay();
        document.getElementById('prevWeekBtn')?.addEventListener('click', () => { currentWeekOffset--; updateWeekDisplay(); });
        document.getElementById('nextWeekBtn')?.addEventListener('click', () => { currentWeekOffset++; updateWeekDisplay(); });
        document.getElementById('exportExcelBtn')?.addEventListener('click', exportToExcel);
        document.getElementById('printBtn')?.addEventListener('click', () => window.print());
        document.getElementById('logoutBtn')?.addEventListener('click', () => { localStorage.clear(); window.location.href = 'index.html'; });
    });
    
    window.showLesson = showLesson;
</script>
</body>
</html>
