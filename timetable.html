<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timetable - SmartClass Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .timetable-container { background: var(--bg-card); border-radius: 16px; overflow-x: auto; margin-top: 20px; border: 1px solid var(--border); }
        .timetable { width: 100%; border-collapse: collapse; min-width: 800px; }
        .timetable th, .timetable td { border: 1px solid var(--border); padding: 12px; text-align: center; vertical-align: top; }
        .timetable th { background: var(--bg-secondary); color: var(--accent-primary); }
        .time-slot { background: var(--bg-secondary); font-weight: 600; width: 80px; }
        .lesson-card { background: rgba(255,102,0,0.1); border-left: 3px solid var(--accent-primary); padding: 8px; margin: 4px 0; border-radius: 8px; font-size: 12px; cursor: pointer; transition: all 0.3s; }
        .lesson-card:hover { background: rgba(255,102,0,0.2); transform: translateX(-2px); }
        .lesson-class { font-weight: 600; margin-bottom: 4px; }
        .lesson-time { font-size: 10px; color: var(--text-dim); }
        .current-lesson-highlight { background: rgba(255,102,0,0.2); position: relative; }
        .export-buttons { display: flex; gap: 12px; margin-bottom: 20px; }
        .week-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        @media (max-width: 768px) { .week-nav { flex-direction: column; gap: 12px; } }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar" id="sidebar">[... same sidebar ...]</aside>

    <main class="main-content">
        <header class="top-header">[... same header ...]</header>

        <div class="section">
            <div class="section-header">
                <h2><i class="fas fa-calendar-week"></i> Weekly Timetable</h2>
                <div class="export-buttons">
                    <button class="btn-secondary" id="exportExcelBtn"><i class="fas fa-file-excel"></i> Excel</button>
                    <button class="btn-secondary" id="printBtn"><i class="fas fa-print"></i> Print</button>
                </div>
            </div>

            <div class="week-nav">
                <button class="btn-secondary" id="prevWeekBtn"><i class="fas fa-chevron-left"></i> Previous Week</button>
                <span id="currentWeekDisplay" style="font-weight: 600;">Week of May 25, 2026</span>
                <button class="btn-secondary" id="nextWeekBtn">Next Week <i class="fas fa-chevron-right"></i></button>
            </div>

            <div class="timetable-container">
                <table class="timetable" id="timetable">
                    <thead><tr id="timetableHeader"></tr></thead>
                    <tbody id="timetableBody"></tbody>
                </table>
            </div>

            <div class="legend" style="margin-top:20px; display:flex; gap:20px; flex-wrap:wrap; padding:16px; background:var(--bg-card); border-radius:12px;">
                <span><i class="fas fa-circle" style="color:#10B981;"></i> Current Lesson</span>
                <span><i class="fas fa-circle" style="color:var(--accent-primary);"></i> Upcoming</span>
                <span><i class="fas fa-circle" style="color:var(--text-dim);"></i> Completed</span>
            </div>
        </div>
    </main>
</div>

<script>
    let currentWeekOffset = 0;
    let timetableData = {};
    const timeSlots = ['07:00', '08:00', '09:00', '10:00', '11:00', '12:00', '13:00', '14:00', '15:00', '16:00', '17:00'];
    const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
    let lessonPlans = [];

    function loadTimetable() {
        lessonPlans = JSON.parse(localStorage.getItem('lessonPlans') || '[]');
        if (lessonPlans.length === 0) {
            lessonPlans = [
                { id: "lp_001", className: "Physics S4A", day: "Monday", startTime: "08:00", duration: 60 },
                { id: "lp_002", className: "Physics S3B", day: "Monday", startTime: "10:00", duration: 60 },
                { id: "lp_003", className: "Physics S4A", day: "Tuesday", startTime: "08:00", duration: 60 },
                { id: "lp_004", className: "Physics S2A", day: "Wednesday", startTime: "14:00", duration: 60 },
                { id: "lp_005", className: "Physics S3A", day: "Thursday", startTime: "09:00", duration: 60 },
                { id: "lp_006", className: "Physics S4A", day: "Friday", startTime: "08:00", duration: 60 }
            ];
        }
        processTimetableData();
    }

    function processTimetableData() {
        timetableData = {};
        for (const day of days) { timetableData[day] = {}; for (const slot of timeSlots) { timetableData[day][slot] = []; } }
        for (const lesson of lessonPlans) {
            const hour = parseInt(lesson.startTime.split(':')[0]);
            const slot = `${hour.toString().padStart(2,'0')}:00`;
            if (timetableData[lesson.day] && timetableData[lesson.day][slot]) {
                timetableData[lesson.day][slot].push(lesson);
            }
        }
        renderTimetable();
    }

    function renderTimetable() {
        const headerRow = document.getElementById('timetableHeader');
        headerRow.innerHTML = `<th class="time-slot">Time</th>${days.map(day => `<th>${day}</th>`).join('')}`;
        
        const tbody = document.getElementById('timetableBody');
        const now = new Date();
        const currentHour = now.getHours();
        const currentDay = days[now.getDay() - 1];
        
        tbody.innerHTML = timeSlots.map(slot => {
            const isCurrentHour = parseInt(slot.split(':')[0]) === currentHour;
            return `<tr>
                <td class="time-slot" style="${isCurrentHour ? 'background: rgba(255,102,0,0.2);' : ''}">${slot}</td>
                ${days.map(day => {
                    const lessons = timetableData[day]?.[slot] || [];
                    const isCurrent = (day === currentDay && isCurrentHour && lessons.length > 0);
                    return `<td class="${isCurrent ? 'current-lesson-highlight' : ''}">
                        ${lessons.map(l => `<div class="lesson-card" onclick="showLesson('${l.className}', '${l.startTime}', ${l.duration})">
                            <div class="lesson-class">${l.className}</div>
                            <div class="lesson-time">${l.startTime} (${l.duration}min)</div>
                        </div>`).join('')}
                        ${lessons.length === 0 ? '<div style="color:var(--text-dim); font-size:12px;">—</div>' : ''}
                    </td>`;
                }).join('')}
            </tr>`;
        }).join('');
    }

    function showLesson(className, time, duration) {
        const endHour = parseInt(time.split(':')[0]) + Math.floor((parseInt(time.split(':')[1]) + duration) / 60);
        const endMin = (parseInt(time.split(':')[1]) + duration) % 60;
        alert(`📖 ${className}\n⏰ ${time} - ${endHour.toString().padStart(2,'0')}:${endMin.toString().padStart(2,'0')}\n⏱️ ${duration} minutes`);
    }

    function exportToExcel() {
        let csv = "Time," + days.join(",") + "\n";
        for (const slot of timeSlots) {
            let row = slot;
            for (const day of days) {
                const lessons = timetableData[day]?.[slot] || [];
                row += `,"${lessons.map(l => l.className).join('; ') || '-'}"`;
            }
            csv += row + "\n";
        }
        const blob = new Blob([csv], { type: 'text/csv' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `timetable_week_${currentWeekOffset}.csv`;
        link.click();
        alert('Timetable exported!');
    }

    function updateWeekDisplay() {
        const now = new Date();
        const monday = new Date(now);
        monday.setDate(now.getDate() - now.getDay() + 1 + (currentWeekOffset * 7));
        const format = d => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        document.getElementById('currentWeekDisplay').innerHTML = `Week of ${format(monday)} - ${format(new Date(monday.getTime() + 4*86400000))}`;
    }

    function checkAuth() {
        if (!localStorage.getItem('teacherToken') && !window.location.pathname.includes('index.html')) {
            window.location.href = 'index.html';
            return false;
        }
        const name = localStorage.getItem('teacherName');
        if (name) document.querySelectorAll('#teacherName').forEach(el => { if (el) el.textContent = name; });
        return true;
    }

    document.addEventListener('DOMContentLoaded', () => {
        if (!checkAuth()) return;
        loadTimetable();
        updateWeekDisplay();
        document.getElementById('prevWeekBtn')?.addEventListener('click', () => { currentWeekOffset--; updateWeekDisplay(); });
        document.getElementById('nextWeekBtn')?.addEventListener('click', () => { currentWeekOffset++; updateWeekDisplay(); });
        document.getElementById('exportExcelBtn')?.addEventListener('click', exportToExcel);
        document.getElementById('printBtn')?.addEventListener('click', () => window.print());
        document.getElementById('logoutBtn')?.addEventListener('click', () => { localStorage.clear(); window.location.href = 'index.html'; });
    });
    
    window.showLesson = showLesson;
</script>
</body>
</html>
