<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timetable - SmartClass Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .timetable-container { background: var(--bg-card); border-radius: 16px; overflow-x: auto; margin-top: 20px; border: 1px solid var(--border); }
        .timetable { width: 100%; border-collapse: collapse; min-width: 800px; }
        .timetable th, .timetable td { border: 1px solid var(--border); padding: 12px; text-align: center; vertical-align: top; }
        .timetable th { background: var(--bg-secondary); color: var(--accent-primary); }
        .time-slot { background: var(--bg-secondary); font-weight: 600; width: 80px; }
        .lesson-card {
            background: rgba(255,102,0,0.1);
            border-left: 3px solid var(--accent-primary);
            padding: 8px;
            margin: 4px 0;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
        }
        .lesson-card:hover { background: rgba(255,102,0,0.2); transform: translateX(-2px); }
        .lesson-class { font-weight: 600; margin-bottom: 4px; }
        .lesson-time { font-size: 10px; color: var(--text-dim); }
        .current-lesson-highlight { background: rgba(255,102,0,0.2); position: relative; }
        .export-buttons { display: flex; gap: 12px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar" id="sidebar">[... same sidebar ...]</aside>

    <main class="main-content">
        <header class="top-header">[... same header ...]</header>

        <div class="section">
            <div class="section-header">
                <h2><i class="fas fa-calendar-week"></i> Weekly Timetable</h2>
                <div class="export-buttons">
                    <button class="btn-secondary" id="exportExcelBtn"><i class="fas fa-file-excel"></i> Excel</button>
                    <button class="btn-secondary" id="printBtn"><i class="fas fa-print"></i> Print</button>
                </div>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <button class="btn-secondary" id="prevWeekBtn"><i class="fas fa-chevron-left"></i> Previous Week</button>
                <span id="currentWeekDisplay" style="font-weight: 600;">Week of May 25, 2026</span>
                <button class="btn-secondary" id="nextWeekBtn">Next Week <i class="fas fa-chevron-right"></i></button>
            </div>

            <div class="timetable-container">
                <table class="timetable" id="timetable">
                    <thead><tr id="timetableHeader"></tr></thead>
                    <tbody id="timetableBody"></tbody>
                </table>
            </div>

            <div style="margin-top: 20px; display: flex; gap: 20px; flex-wrap: wrap; padding: 16px; background: var(--bg-card); border-radius: 12px;">
                <span><i class="fas fa-circle" style="color: #10B981;"></i> Current Lesson</span>
                <span><i class="fas fa-circle" style="color: var(--accent-primary);"></i> Upcoming</span>
                <span><i class="fas fa-circle" style="color: var(--text-dim);"></i> Completed</span>
            </div>
        </div>
    </main>
</div>

<script src="js/auth.js"></script>
<script src="js/theme.js"></script>
<script src="js/storage.js"></script>
<script src="js/app.js"></script>
<script>
    let currentWeekOffset = 0;
    let timetableData = {};
    const timeSlots = ['07:00', '08:00', '09:00', '10:00', '11:00', '12:00', '13:00', '14:00', '15:00', '16:00', '17:00'];
    const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];

    document.addEventListener('DOMContentLoaded', () => {
        loadTimetable();
        setupEventListeners();
        updateWeekDisplay();
    });

    function setupEventListeners() {
        document.getElementById('prevWeekBtn')?.addEventListener('click', () => { currentWeekOffset--; updateWeekDisplay(); loadTimetable(); });
        document.getElementById('nextWeekBtn')?.addEventListener('click', () => { currentWeekOffset++; updateWeekDisplay(); loadTimetable(); });
        document.getElementById('exportExcelBtn')?.addEventListener('click', exportToExcel);
        document.getElementById('printBtn')?.addEventListener('click', () => window.print());
    }

    function updateWeekDisplay() {
        const now = new Date();
        const currentMonday = new Date(now);
        currentMonday.setDate(now.getDate() - now.getDay() + 1 + (currentWeekOffset * 7));
        const formatDate = (d) => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        document.getElementById('currentWeekDisplay').innerHTML = `Week of ${formatDate(currentMonday)} - ${formatDate(new Date(currentMonday.getTime() + 4*86400000))}`;
    }

    function loadTimetable() {
        const lessons = storage.getLessonPlans();
        const classes = storage.getClasses();
        const lessonsWithNames = lessons.map(l => ({ ...l, className: classes.find(c => c.id === l.classId)?.name || 'Unknown' }));
        processTimetableData(lessonsWithNames);
    }

    function processTimetableData(lessons) {
        timetableData = {};
        for (const day of days) { timetableData[day] = {}; for (const slot of timeSlots) { timetableData[day][slot] = []; } }
        
        for (const lesson of lessons) {
            const startHour = parseInt(lesson.startTime.split(':')[0]);
            const startSlot = `${startHour.toString().padStart(2,'0')}:00`;
            if (timetableData[lesson.day] && timetableData[lesson.day][startSlot]) {
                timetableData[lesson.day][startSlot].push(lesson);
            }
        }
        renderTimetable();
    }

    function renderTimetable() {
        const headerRow = document.getElementById('timetableHeader');
        headerRow.innerHTML = `<th class="time-slot">Time</th>${days.map(day => `<th>${day}</th>`).join('')}`;
        
        const tbody = document.getElementById('timetableBody');
        const now = new Date();
        const currentHour = now.getHours();
        const currentDay = days[now.getDay() - 1];
        
        tbody.innerHTML = timeSlots.map(slot => {
            const isCurrentHour = parseInt(slot.split(':')[0]) === currentHour;
            return `
                <tr>
                    <td class="time-slot" style="${isCurrentHour ? 'background: rgba(255,102,0,0.2);' : ''}">${slot}</td>
                    ${days.map(day => {
                        const lessons = timetableData[day]?.[slot] || [];
                        const isCurrent = (day === currentDay && isCurrentHour && lessons.length > 0);
                        return `<td class="${isCurrent ? 'current-lesson-highlight' : ''}">
                            ${lessons.map(lesson => `<div class="lesson-card" onclick="alert('${lesson.className}\\n${lesson.startTime} (${lesson.duration} min)')">
                                <div class="lesson-class">${lesson.className}</div>
                                <div class="lesson-time">${lesson.startTime} (${lesson.duration}min)</div>
                            </div>`).join('')}
                            ${lessons.length === 0 ? '<div style="color: var(--text-dim); font-size: 12px;">—</div>' : ''}
                        </td>`;
                    }).join('')}
                </tr>
            `;
        }).join('');
    }

    function exportToExcel() {
        let csv = "Time," + days.join(",") + "\n";
        for (const slot of timeSlots) {
            let row = slot;
            for (const day of days) {
                const lessons = timetableData[day]?.[slot] || [];
                const lessonNames = lessons.map(l => l.className).join("; ");
                row += `,"${lessonNames || '-'}"`;
            }
            csv += row + "\n";
        }
        const blob = new Blob([csv], { type: 'text/csv' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `timetable_week_${currentWeekOffset}.csv`;
        link.click();
        showToast('Timetable exported to CSV!', 'success');
    }

    function showToast(msg, type) {
        const toast = document.createElement('div');
        toast.style.cssText = `position:fixed; bottom:20px; right:20px; background:${type === 'success' ? '#10B981' : '#FF6600'}; color:white; padding:12px 20px; border-radius:8px; z-index:1000;`;
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
</script>
</body>
</html>
