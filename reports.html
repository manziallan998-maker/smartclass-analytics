<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - SmartClass Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .report-card { background: var(--bg-card); border-radius: 16px; padding: 24px; margin-bottom: 20px; border: 1px solid var(--border); }
        .report-options { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .option-group { background: var(--bg-secondary); padding: 16px; border-radius: 12px; }
        .option-group label { display: block; margin-bottom: 8px; color: var(--text-dim); }
        .option-group select, .option-group input { width: 100%; padding: 10px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); }
        .preview-container { background: white; color: black; padding: 20px; border-radius: 12px; margin-top: 20px; display: none; }
        .student-report-card { border: 1px solid #ddd; padding: 20px; margin: 10px 0; border-radius: 8px; }
        .report-header { text-align: center; border-bottom: 2px solid #FF6600; padding-bottom: 16px; margin-bottom: 16px; }
        .report-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar" id="sidebar">[... same sidebar ...]</aside>

    <main class="main-content">
        <header class="top-header">[... same header ...]</header>

        <div class="section">
            <div class="section-header">
                <h2><i class="fas fa-file-alt"></i> Reports Center</h2>
                <p>Generate official reports for school administration</p>
            </div>

            <div class="report-card">
                <h3 style="margin-bottom: 16px;">Select Report Type</h3>
                <div class="report-options">
                    <div class="option-group"><label>Report Type</label><select id="reportType">
                        <option value="class_summary">Class Summary Report</option>
                        <option value="student_report_card">Student Report Card</option>
                        <option value="term_report">Term Performance Report</option>
                        <option value="sdms_export">SDMS Export</option>
                    </select></div>
                    <div class="option-group"><label>Select Class</label><select id="reportClass"></select></div>
                    <div class="option-group"><label>Select Term</label><select id="reportTerm"><option value="1">Term 1</option><option value="2">Term 2</option><option value="3" selected>Term 3</option></select></div>
                    <div class="option-group"><label>Academic Year</label><input type="text" id="academicYear" value="2026"></div>
                </div>
                <div style="display: flex; gap: 12px;">
                    <button class="btn-primary" id="generateReportBtn"><i class="fas fa-chart-line"></i> Generate Report</button>
                    <button class="btn-secondary" id="exportPdfBtn"><i class="fas fa-file-pdf"></i> Export PDF</button>
                    <button class="btn-secondary" id="printReportBtn"><i class="fas fa-print"></i> Print</button>
                </div>
            </div>

            <div id="reportPreview" class="preview-container"></div>
        </div>
    </main>
</div>

<script src="js/auth.js"></script>
<script src="js/theme.js"></script>
<script src="js/storage.js"></script>
<script src="js/app.js"></script>
<script>
    let classesData = [];
    let studentsData = [];

    document.addEventListener('DOMContentLoaded', () => {
        loadClasses();
        setupEventListeners();
    });

    function loadClasses() {
        classesData = storage.getClasses();
        const select = document.getElementById('reportClass');
        select.innerHTML = classesData.map(c => `<option value="${c.id}">${c.name} (${c.studentCount || 0} students)</option>`).join('');
    }

    function setupEventListeners() {
        document.getElementById('generateReportBtn')?.addEventListener('click', generateReport);
        document.getElementById('exportPdfBtn')?.addEventListener('click', () => alert('PDF export feature - click Print and save as PDF'));
        document.getElementById('printReportBtn')?.addEventListener('click', () => {
            const preview = document.getElementById('reportPreview');
            if (preview.innerHTML) {
                const printWindow = window.open('', '_blank');
                printWindow.document.write(`<html><head><title>Report</title><style>body{font-family:Arial;padding:40px;}table{width:100%;border-collapse:collapse;}th,td{border:1px solid #ddd;padding:8px;}</style></head><body>${preview.innerHTML}</body></html>`);
                printWindow.document.close();
                printWindow.print();
            }
        });
    }

    async function generateReport() {
        const reportType = document.getElementById('reportType').value;
        const classId = document.getElementById('reportClass').value;
        const term = document.getElementById('reportTerm').value;
        const year = document.getElementById('academicYear').value;
        const className = classesData.find(c => c.id === classId)?.name || 'Selected Class';
        
        studentsData = storage.getStudents(classId);
        
        let html = '';
        if (reportType === 'class_summary') html = generateClassSummary(className, term, year);
        else if (reportType === 'student_report_card') html = generateStudentReportCards(className, term, year);
        else if (reportType === 'term_report') html = generateTermReport(className, term, year);
        else if (reportType === 'sdms_export') html = generateSdmsExport(className, term, year);
        
        const preview = document.getElementById('reportPreview');
        preview.style.display = 'block';
        preview.innerHTML = html;
    }

    function generateClassSummary(className, term, year) {
        const scores = studentsData.map(s => s[`term${term}`] || 0);
        const average = scores.reduce((a,b) => a + b, 0) / (scores.length || 1);
        const highest = Math.max(...scores, 0);
        const lowest = Math.min(...scores, 100);
        const passing = scores.filter(s => s >= 50).length;
        const passingRate = (passing / (scores.length || 1) * 100).toFixed(1);
        
        return `<div class="student-report-card">
            <div class="report-header"><h2>CLASS SUMMARY REPORT</h2><h3>${className}</h3><p>Term ${term} - ${year}</p></div>
            <div class="report-row"><strong>Total Students:</strong> ${studentsData.length}</div>
            <div class="report-row"><strong>Class Average:</strong> ${average.toFixed(1)}%</div>
            <div class="report-row"><strong>Highest Score:</strong> ${highest}%</div>
            <div class="report-row"><strong>Lowest Score:</strong> ${lowest}%</div>
            <div class="report-row"><strong>Passing Rate:</strong> ${passingRate}%</div>
            <div class="report-row"><strong>Failing Students:</strong> ${studentsData.length - passing}</div>
            <div class="report-header" style="margin-top:20px;"><p>Teacher Signature: ___________________</p></div>
        </div>`;
    }

    function generateStudentReportCards(className, term, year) {
        return studentsData.map(s => {
            const score = s[`term${term}`] || 0;
            const grade = score >= 90 ? 'A' : score >= 80 ? 'B' : score >= 70 ? 'C' : score >= 50 ? 'D' : 'F';
            const remark = score >= 90 ? 'Excellent' : score >= 80 ? 'Very Good' : score >= 70 ? 'Good' : score >= 50 ? 'Satisfactory' : 'Needs Improvement';
            return `<div class="student-report-card">
                <div class="report-header"><h2>MINISTRY OF EDUCATION - RWANDA</h2><h3>STUDENT REPORT CARD</h3><p>${year} - Term ${term}</p></div>
                <div class="report-row"><strong>Student Name:</strong> ${s.name}</div>
                <div class="report-row"><strong>Registration Number:</strong> ${s.regNumber || 'N/A'}</div>
                <div class="report-row"><strong>Class:</strong> ${className}</div>
                <div class="report-row"><strong>Subject:</strong> Physics</div>
                <div class="report-row"><strong>Score:</strong> ${score}%</div>
                <div class="report-row"><strong>Grade:</strong> ${grade}</div>
                <div class="report-row"><strong>Remark:</strong> ${remark}</div>
                <div class="report-header" style="margin-top:20px;"><p>Teacher's Signature: ___________________</p><p>Parent's Signature: ___________________</p></div>
            </div>`;
        }).join('');
    }

    function generateTermReport(className, term, year) {
        const term1Avg = studentsData.reduce((a,b) => a + (b.term1 || 0), 0) / (studentsData.length || 1);
        const term2Avg = studentsData.reduce((a,b) => a + (b.term2 || 0), 0) / (studentsData.length || 1);
        const term3Avg = studentsData.reduce((a,b) => a + (b.term3 || 0), 0) / (studentsData.length || 1);
        const topStudents = [...studentsData].sort((a,b) => (b[`term${term}`] || 0) - (a[`term${term}`] || 0)).slice(0,5);
        
        return `<div class="student-report-card">
            <div class="report-header"><h2>TERM PERFORMANCE REPORT</h2><h3>${className}</h3><p>${year} Academic Year</p></div>
            <div class="report-row"><strong>Term 1 Average:</strong> ${term1Avg.toFixed(1)}%</div>
            <div class="report-row"><strong>Term 2 Average:</strong> ${term2Avg.toFixed(1)}%</div>
            <div class="report-row"><strong>Term 3 Average:</strong> ${term3Avg.toFixed(1)}%</div>
            <div class="report-row"><strong>Overall Improvement:</strong> ${(term3Avg - term1Avg).toFixed(1)}%</div>
            <h4 style="margin-top:20px;">Top Performing Students</h4>
            ${topStudents.map((s,i) => `<div class="report-row">${i+1}. ${s.name} - ${s[`term${term}`] || 0}%</div>`).join('')}
        </div>`;
    }

    function generateSdmsExport(className, term, year) {
        return `<div class="student-report-card">
            <div class="report-header"><h2>SDMS COMPATIBLE EXPORT</h2><p>${className} - Term ${term} - ${year}</p></div>
            <table style="width:100%"><thead><tr><th>Registration Number</th><th>Student Name</th><th>Score</th><th>Grade</th><th>Remark</th></tr></thead>
            <tbody>${studentsData.map(s => {
                const score = s[`term${term}`] || 0;
                const grade = score >= 90 ? 'A' : score >= 80 ? 'B' : score >= 70 ? 'C' : score >= 50 ? 'D' : 'F';
                return `<tr><td>${s.regNumber || 'N/A'}</td><td>${s.name}</td><td>${score}</td><td>${grade}</td><td>${grade === 'F' ? 'Repeat' : 'Promoted'}</td></tr>`;
            }).join('')}</tbody>
            </table>
            <p style="margin-top:20px;">This report is compatible with SDMS/Urubuto import format.</p>
        </div>`;
    }
</script>
</body>
</html>
