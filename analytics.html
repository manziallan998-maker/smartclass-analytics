<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - SmartClass Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-bottom: 24px;
        }
        .chart-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border);
        }
        .chart-card h3 { margin-bottom: 16px; font-size: 16px; color: var(--text-dim); }
        canvas { max-height: 300px; }
        .comparison-table {
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .comparison-table table { width: 100%; border-collapse: collapse; }
        .comparison-table th, .comparison-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .comparison-table th { background: var(--bg-secondary); color: var(--accent-primary); }
        .trend-up { color: #10B981; }
        .trend-down { color: #EF4444; }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar" id="sidebar">[... same sidebar ...]</aside>

    <main class="main-content">
        <header class="top-header">[... same header ...]</header>

        <div class="section">
            <div class="section-header">
                <h2>Performance Analytics</h2>
                <div class="section-actions">
                    <select id="termSelect" class="search-input" style="width: auto;">
                        <option value="1">Term 1</option>
                        <option value="2">Term 2</option>
                        <option value="3" selected>Term 3</option>
                    </select>
                    <button class="btn-secondary" id="exportAnalyticsBtn"><i class="fas fa-download"></i> Export</button>
                </div>
            </div>

            <div class="class-selector" id="classSelector" style="display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px;"></div>

            <div id="analyticsDashboard" style="display: none;">
                <div class="analytics-grid">
                    <div class="chart-card"><h3>Class Performance Comparison</h3><canvas id="classComparisonChart"></canvas></div>
                    <div class="chart-card"><h3>Grade Distribution</h3><canvas id="gradeDistributionChart"></canvas></div>
                </div>

                <div class="comparison-table">
                    <h3 style="padding: 16px; margin: 0;">Class Comparison</h3>
                    <table id="comparisonTable">
                        <thead><tr><th>Class</th><th>Average</th><th>Highest</th><th>Lowest</th><th>Passing Rate</th><th>Trend</th></tr></thead>
                        <tbody id="comparisonBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="js/auth.js"></script>
<script src="js/theme.js"></script>
<script src="js/storage.js"></script>
<script src="js/app.js"></script>
<script>
    let classComparisonChart = null;
    let gradeDistributionChart = null;
    let currentClassesData = [];

    document.addEventListener('DOMContentLoaded', () => {
        loadClasses();
        document.getElementById('termSelect')?.addEventListener('change', updateAnalytics);
        document.getElementById('exportAnalyticsBtn')?.addEventListener('click', exportAnalytics);
    });

    function loadClasses() {
        currentClassesData = storage.getClasses();
        displayClassSelector(currentClassesData);
        if (currentClassesData.length > 0) {
            loadAnalytics(currentClassesData);
            document.getElementById('analyticsDashboard').style.display = 'block';
        }
    }

    function displayClassSelector(classes) {
        const container = document.getElementById('classSelector');
        container.innerHTML = `
            <button class="class-card active" data-id="all" style="background: var(--accent-primary); border-radius: 12px; padding: 12px 20px; cursor: pointer;">ALL CLASSES</button>
            ${classes.map(cls => `
                <button class="class-card" data-id="${cls.id}" style="background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 20px; cursor: pointer;">${cls.name}</button>
            `).join('')}
        `;
        
        document.querySelectorAll('.class-card').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.class-card').forEach(b => b.style.background = 'var(--bg-card)');
                btn.style.background = 'var(--accent-primary)';
                const classId = btn.dataset.id === 'all' ? 'all' : btn.dataset.id;
                loadAnalytics(currentClassesData, classId);
            });
        });
    }

    function loadAnalytics(classes, filterClassId = 'all') {
        const term = parseInt(document.getElementById('termSelect').value);
        const classData = filterClassId === 'all' ? classes : classes.filter(c => c.id === filterClassId);
        
        const classNames = classData.map(c => c.name);
        const averages = classData.map(c => {
            const students = storage.getStudents(c.id);
            const avg = students.reduce((a,b) => a + ((b[`term${term}`] || 0)), 0) / (students.length || 1);
            return avg;
        });
        
        if (classComparisonChart) classComparisonChart.destroy();
        classComparisonChart = new Chart(document.getElementById('classComparisonChart'), {
            type: 'bar',
            data: { labels: classNames, datasets: [{ label: `Term ${term} Average (%)`, data: averages, backgroundColor: '#FF6600' }] },
            options: { responsive: true, maintainAspectRatio: true, scales: { y: { min: 0, max: 100 } } }
        });
        
        if (gradeDistributionChart) gradeDistributionChart.destroy();
        gradeDistributionChart = new Chart(document.getElementById('gradeDistributionChart'), {
            type: 'doughnut',
            data: { labels: ['A (90-100%)', 'B (80-89%)', 'C (70-79%)', 'D (50-69%)', 'F (0-49%)'], 
                    datasets: [{ data: [15, 25, 30, 20, 10], backgroundColor: ['#8B5CF6', '#3B82F6', '#10B981', '#F59E0B', '#EF4444'] }] },
            options: { responsive: true }
        });
        
        const comparisonBody = document.getElementById('comparisonBody');
        comparisonBody.innerHTML = classData.map(c => {
            const students = storage.getStudents(c.id);
            const scores = students.map(s => s[`term${term}`] || 0);
            const avg = scores.reduce((a,b) => a + b, 0) / (scores.length || 1);
            const highest = Math.max(...scores, 0);
            const lowest = Math.min(...scores, 100);
            const passing = scores.filter(s => s >= 50).length;
            const passingRate = (passing / (scores.length || 1) * 100).toFixed(1);
            return `<tr><td>${c.name}</td><td><strong>${avg.toFixed(1)}%</strong></td><td>${highest}%</td><td>${lowest}%</td><td>${passingRate}%</td><td class="trend-up">↑ 0%</td></tr>`;
        }).join('');
    }

    function updateAnalytics() { loadAnalytics(currentClassesData); }
    function exportAnalytics() { alert('Export feature will generate PDF/Excel report'); }
</script>
</body>
</html>
