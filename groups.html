<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Groups - SmartClass Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .groups-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .group-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border);
        }
        .group-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        .group-number { font-size: 18px; font-weight: 700; color: var(--accent-primary); }
        .group-avg { background: var(--bg-hover); padding: 4px 12px; border-radius: 20px; font-size: 14px; }
        .group-leader { background: rgba(255,102,0,0.1); padding: 8px 12px; border-radius: 8px; margin-bottom: 12px; }
        .member-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }
        .member-name { display: flex; align-items: center; gap: 8px; }
        .score-high { color: #10B981; font-weight: 600; }
        .score-low { color: #EF4444; font-weight: 600; }
        .config-group {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }
        .config-row { display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-end; }
        .config-group-item { flex: 1; }
        .config-group-item label { display: block; margin-bottom: 8px; color: var(--text-dim); font-size: 14px; }
        .config-group-item input { width: 100%; padding: 10px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); }
        .strategy-buttons { display: flex; gap: 12px; margin-top: 16px; }
        .strategy-btn {
            flex: 1;
            padding: 10px;
            background: var(--bg-hover);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
        }
        .strategy-btn.active { background: var(--accent-primary); border-color: var(--accent-primary); color: white; }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar" id="sidebar">[... same sidebar as classes ...]</aside>

    <main class="main-content">
        <header class="top-header">[... same header ...]</header>

        <div class="section">
            <div class="section-header">
                <h2><i class="fas fa-users"></i> Smart Groups</h2>
                <button class="btn-secondary" id="refreshGroupsBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
            </div>

            <div class="class-selector" id="classSelector" style="display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px;"></div>

            <div id="groupConfig" style="display: none;">
                <div class="config-group">
                    <h3 style="margin-bottom: 16px;">Group Configuration</h3>
                    <div class="config-row">
                        <div class="config-group-item">
                            <label>Number of Groups</label>
                            <input type="number" id="numGroups" min="2" max="10" value="6">
                        </div>
                        <div class="config-group-item">
                            <label>Students per group</label>
                            <input type="text" id="studentsPerGroup" readonly disabled>
                        </div>
                        <div class="config-group-item">
                            <button class="btn-primary" id="generateGroupsBtn" style="width: 100%;">🎲 Generate Groups</button>
                        </div>
                    </div>
                    <div class="strategy-buttons">
                        <button class="strategy-btn active" data-strategy="balanced">⚖️ Balanced by Performance</button>
                        <button class="strategy-btn" data-strategy="random">🎲 Random Grouping</button>
                        <button class="strategy-btn" data-strategy="same">🏆 Best Together</button>
                    </div>
                </div>
            </div>

            <div id="groupsContainer" class="groups-container"></div>
        </div>
    </main>
</div>

<script src="js/auth.js"></script>
<script src="js/theme.js"></script>
<script src="js/storage.js"></script>
<script src="js/app.js"></script>
<script>
    let currentClassId = null;
    let currentStrategy = 'balanced';
    let currentStudents = [];

    document.addEventListener('DOMContentLoaded', () => {
        loadClasses();
        setupEventListeners();
    });

    function setupEventListeners() {
        document.getElementById('generateGroupsBtn')?.addEventListener('click', generateGroups);
        document.getElementById('refreshGroupsBtn')?.addEventListener('click', () => generateGroups());
        
        document.querySelectorAll('.strategy-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.strategy-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentStrategy = btn.dataset.strategy;
            });
        });
        
        document.getElementById('numGroups')?.addEventListener('input', updateStudentsPerGroup);
    }

    function loadClasses() {
        const classes = storage.getClasses();
        const container = document.getElementById('classSelector');
        container.innerHTML = classes.map(cls => `
            <button class="class-card" data-id="${cls.id}" style="background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 20px; cursor: pointer;">
                ${cls.name} <small style="color: var(--text-dim);">(${cls.studentCount || 0} students)</small>
            </button>
        `).join('');
        
        document.querySelectorAll('.class-card').forEach(btn => {
            btn.addEventListener('click', () => selectClass(btn.dataset.id));
        });
    }

    function selectClass(classId) {
        currentClassId = classId;
        document.getElementById('groupConfig').style.display = 'block';
        currentStudents = storage.getStudents(classId);
        updateStudentsPerGroup();
    }

    function updateStudentsPerGroup() {
        const numGroups = parseInt(document.getElementById('numGroups').value) || 6;
        const studentsPerGroup = Math.ceil(currentStudents.length / numGroups);
        document.getElementById('studentsPerGroup').value = studentsPerGroup;
    }

    function generateGroups() {
        const numGroups = parseInt(document.getElementById('numGroups').value);
        const students = [...currentStudents];
        
        // Calculate averages
        students.forEach(s => {
            s.average = ((s.term1 || 0) + (s.term2 || 0) + (s.term3 || 0)) / 3;
        });
        
        // Sort by performance
        if (currentStrategy === 'balanced') {
            students.sort((a, b) => b.average - a.average);
        } else if (currentStrategy === 'random') {
            for (let i = students.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [students[i], students[j]] = [students[j], students[i]];
            }
        }
        
        // Create groups
        const groups = Array(numGroups).fill().map(() => []);
        
        for (let i = 0; i < students.length; i++) {
            groups[i % numGroups].push(students[i]);
        }
        
        // Mark leaders (top performer in each group)
        groups.forEach(group => {
            group.sort((a, b) => b.average - a.average);
            if (group.length > 0) group[0].isLeader = true;
        });
        
        displayGroups(groups);
    }

    function displayGroups(groups) {
        const container = document.getElementById('groupsContainer');
        container.innerHTML = groups.map((group, idx) => {
            const avg = group.reduce((sum, s) => sum + s.average, 0) / group.length;
            const leader = group.find(s => s.isLeader) || group[0];
            return `
                <div class="group-card">
                    <div class="group-header">
                        <span class="group-number"><i class="fas fa-users"></i> GROUP ${idx + 1}</span>
                        <span class="group-avg">Avg: ${avg.toFixed(1)}%</span>
                    </div>
                    <div class="group-leader">
                        <i class="fas fa-crown" style="color: #F59E0B;"></i> Captain: ${leader ? leader.name : 'Not assigned'}
                    </div>
                    <div>
                        ${group.map(m => `
                            <div class="member-item">
                                <div class="member-name">
                                    <i class="fas fa-user-graduate"></i>
                                    <span>${m.name}</span>
                                </div>
                                <div class="${m.average >= 80 ? 'score-high' : (m.average < 50 ? 'score-low' : '')}">${m.average.toFixed(0)}%</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }).join('');
    }
</script>
</body>
</html>
