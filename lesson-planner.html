<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson Planner - SmartClass Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .planner-container { padding: 0 32px 24px 32px; }
        .upload-area {
            background: var(--bg-card);
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            margin-bottom: 24px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:hover { border-color: var(--accent-primary); background: var(--bg-hover); }
        .current-lesson {
            background: linear-gradient(135deg, rgba(255,102,0,0.15), var(--bg-card));
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            text-align: center;
            border: 1px solid var(--border);
        }
        .time-remaining { font-size: 48px; font-weight: 700; color: var(--accent-primary); margin: 16px 0; font-family: monospace; }
        .progress-tracker { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; margin: 16px 0; }
        .progress-fill { height: 100%; background: #10B981; transition: width 1s linear; }
        .day-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .day-tab {
            padding: 8px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .day-tab.active { background: var(--accent-primary); border-color: var(--accent-primary); color: white; }
        .schedule-table { width: 100%; border-collapse: collapse; background: var(--bg-card); border-radius: 16px; overflow: hidden; }
        .schedule-table th, .schedule-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); }
        .schedule-table th { background: var(--bg-secondary); color: var(--accent-primary); }
        .reminder-popup {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--bg-card);
            border-left: 4px solid #F59E0B;
            border-radius: 12px;
            padding: 16px 20px;
            max-width: 350px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .btn-icon { background: none; border: none; color: var(--text-dim); cursor: pointer; padding: 4px 8px; }
        .btn-icon:hover { color: var(--accent-primary); }
        @media (max-width: 768px) {
            .planner-container { padding: 0 16px 16px 16px; }
            .time-remaining { font-size: 32px; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar" id="sidebar">[... same sidebar ...]</aside>

    <main class="main-content">
        <header class="top-header">[... same header ...]</header>

        <div class="planner-container">
            <div class="section-header">
                <h2><i class="fas fa-calendar-alt"></i> Smart Lesson Planner</h2>
                <button class="btn-secondary" id="viewFullScheduleBtn"><i class="fas fa-table"></i> Full Schedule</button>
            </div>

            <div class="upload-area" id="uploadArea">
                <i class="fas fa-cloud-upload-alt" style="font-size: 48px; color: var(--accent-primary); margin-bottom: 16px;"></i>
                <h3>Upload Lesson Plan File</h3>
                <p style="color: var(--text-dim);">Supported: Excel (.xlsx, .xls), CSV</p>
                <p style="color: var(--text-dim); font-size: 12px; margin-top: 8px;">Format: Class, Day, Start Time, Duration (minutes)</p>
                <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display: none;">
                <button class="btn-primary" id="selectFileBtn" style="margin-top: 16px;">Select File</button>
            </div>

            <div id="currentLessonContainer"></div>

            <div class="day-tabs" id="dayTabs">
                <button class="day-tab active" data-day="Monday">Monday</button>
                <button class="day-tab" data-day="Tuesday">Tuesday</button>
                <button class="day-tab" data-day="Wednesday">Wednesday</button>
                <button class="day-tab" data-day="Thursday">Thursday</button>
                <button class="day-tab" data-day="Friday">Friday</button>
            </div>

            <div class="table-container">
                <table class="schedule-table" id="scheduleTable">
                    <thead><tr><th>Time</th><th>Class</th><th>Duration</th><th>Status</th><th>Remaining</th><th>Action</th></tr></thead>
                    <tbody id="scheduleBody"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<!-- Full Schedule Modal -->
<div class="modal" id="fullScheduleModal">
    <div class="modal-content" style="max-width: 900px;">
        <div class="modal-header"><h3>Full Weekly Schedule</h3><button class="close-modal" onclick="closeModal('fullScheduleModal')">&times;</button></div>
        <div id="fullScheduleContent"></div>
    </div>
</div>

<!-- Add Lesson Modal -->
<div class="modal" id="addLessonModal">
    <div class="modal-content">
        <div class="modal-header"><h3>Add Lesson</h3><button class="close-modal" onclick="closeModal('addLessonModal')">&times;</button></div>
        <form id="addLessonForm">
            <div class="form-group"><label>Class</label><select id="lessonClass" required></select></div>
            <div class="form-group"><label>Day</label><select id="lessonDay"><option>Monday</option><option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option></select></div>
            <div class="form-group"><label>Start Time</label><input type="time" id="lessonTime" required></div>
            <div class="form-group"><label>Duration (minutes)</label><input type="number" id="lessonDuration" min="15" max="180" value="60" required></div>
            <button type="submit" class="btn-primary">Add Lesson</button>
        </form>
    </div>
</div>

<script>
    let lessonPlans = [];
    let currentDay = 'Monday';
    let countdownInterval = null;
    let allClasses = [];

    function loadData() {
        allClasses = JSON.parse(localStorage.getItem('classes') || '[]');
        lessonPlans = JSON.parse(localStorage.getItem('lessonPlans') || '[]');
        
        if (allClasses.length === 0) {
            allClasses = [
                { id: "cls_001", name: "Physics S4A" }, { id: "cls_002", name: "Physics S3B" },
                { id: "cls_003", name: "Physics S3A" }, { id: "cls_004", name: "Physics S2A" },
                { id: "cls_005", name: "Physics S2B" }
            ];
        }
        
        if (lessonPlans.length === 0) {
            lessonPlans = [
                { id: "lp_001", classId: "cls_001", className: "Physics S4A", day: "Monday", startTime: "08:00", duration: 60 },
                { id: "lp_002", classId: "cls_002", className: "Physics S3B", day: "Monday", startTime: "10:00", duration: 60 },
                { id: "lp_003", classId: "cls_001", className: "Physics S4A", day: "Tuesday", startTime: "08:00", duration: 60 },
                { id: "lp_004", classId: "cls_004", className: "Physics S2A", day: "Wednesday", startTime: "14:00", duration: 60 },
                { id: "lp_005", classId: "cls_003", className: "Physics S3A", day: "Thursday", startTime: "09:00", duration: 60 },
                { id: "lp_006", classId: "cls_001", className: "Physics S4A", day: "Friday", startTime: "08:00", duration: 60 }
            ];
            localStorage.setItem('lessonPlans', JSON.stringify(lessonPlans));
        }
        
        populateClassSelect();
        displaySchedule();
        updateCurrentLesson();
    }

    function populateClassSelect() {
        const select = document.getElementById('lessonClass');
        if (select) {
            select.innerHTML = allClasses.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        }
    }

    function displaySchedule() {
        const filtered = lessonPlans.filter(p => p.day === currentDay);
        filtered.sort((a, b) => a.startTime.localeCompare(b.startTime));
        
        const tbody = document.getElementById('scheduleBody');
        const now = new Date();
        const currentTime = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        
        tbody.innerHTML = filtered.map(lesson => {
            const isCurrent = isCurrentLesson(lesson);
            const remaining = getTimeRemaining(lesson);
            let status = '⏳ Upcoming';
            let statusColor = '#F59E0B';
            
            if (isCurrent) { status = '🟢 IN PROGRESS'; statusColor = '#10B981'; }
            else if (lesson.startTime < currentTime) { status = '✅ Completed'; statusColor = 'var(--text-dim)'; }
            
            return `
                <tr style="${isCurrent ? 'background: rgba(255,102,0,0.1);' : ''}">
                    <td><strong>${lesson.startTime}</strong></td>
                    <td>${lesson.className}</td>
                    <td>${lesson.duration} min</td>
                    <td style="color: ${statusColor};">${status}</td>
                    <td>${isCurrent ? remaining : (lesson.startTime > currentTime ? 'Not started' : 'Finished')}</td>
                    <td><button class="btn-icon" onclick="deleteLesson('${lesson.id}')"><i class="fas fa-trash"></i></button></td>
                <tr>
            `;
        }).join('');
        
        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">No lessons scheduled for this day</td></tr>';
        }
    }

    function updateCurrentLesson() {
        const container = document.getElementById('currentLessonContainer');
        const current = findCurrentLesson();
        
        if (!current) {
            container.innerHTML = `<div class="current-lesson"><h3><i class="fas fa-clock"></i> No Active Lesson</h3><p>Next: ${getNextLesson() || 'No lessons scheduled'}</p></div>`;
            if (countdownInterval) clearInterval(countdownInterval);
            return;
        }
        
        const endTime = calculateEndTime(current.startTime, current.duration);
        container.innerHTML = `
            <div class="current-lesson">
                <h3><i class="fas fa-chalkboard"></i> ${current.className}</h3>
                <p>${current.startTime} - ${endTime}</p>
                <div class="time-remaining" id="timeRemaining">Loading...</div>
                <div class="progress-tracker"><div class="progress-fill" id="progressFill" style="width: 0%;"></div></div>
                <p><i class="fas fa-bell"></i> Reminder when lesson ends</p>
            </div>
        `;
        startCountdown(current);
    }

    function startCountdown(lesson) {
        if (countdownInterval) clearInterval(countdownInterval);
        
        const [startHour, startMin] = lesson.startTime.split(':').map(Number);
        const lessonStart = new Date(); lessonStart.setHours(startHour, startMin, 0, 0);
        const lessonEnd = new Date(lessonStart.getTime() + lesson.duration * 60000);
        
        function update() {
            const now = new Date();
            if (now >= lessonEnd) {
                document.getElementById('timeRemaining').innerHTML = '00:00:00';
                document.getElementById('progressFill').style.width = '100%';
                showReminder(lesson);
                if (countdownInterval) clearInterval(countdownInterval);
                return;
            }
            const remaining = lessonEnd - now;
            const hours = Math.floor(remaining / 3600000);
            const minutes = Math.floor((remaining % 3600000) / 60000);
            const seconds = Math.floor((remaining % 60000) / 1000);
            document.getElementById('timeRemaining').innerHTML = `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
            const total = lesson.duration * 60 * 1000;
            const elapsed = total - remaining;
            document.getElementById('progressFill').style.width = `${(elapsed / total) * 100}%`;
        }
        update();
        countdownInterval = setInterval(update, 1000);
    }

    function showReminder(lesson) {
        const next = getNextLessonAfter(lesson);
        const div = document.createElement('div');
        div.className = 'reminder-popup';
        div.innerHTML = `
            <i class="fas fa-bell" style="color: #F59E0B;"></i>
            <strong>Time to Leave!</strong>
            <p>${lesson.className} lesson has ended.</p>
            <p><i class="fas fa-arrow-right"></i> Next: ${next ? `${next.className} at ${next.startTime}` : 'No more lessons'}</p>
            <button onclick="this.parentElement.remove()" style="margin-top:8px; background:var(--accent-primary); border:none; padding:4px 12px; border-radius:4px; color:white; cursor:pointer;">Dismiss</button>
        `;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 10000);
    }

    function findCurrentLesson() {
        const now = new Date();
        const currentTime = now.getHours() * 60 + now.getMinutes();
        const today = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'][now.getDay()];
        return lessonPlans.find(l => {
            if (l.day !== today) return false;
            const [h, m] = l.startTime.split(':').map(Number);
            const start = h * 60 + m;
            const end = start + l.duration;
            return currentTime >= start && currentTime < end;
        });
    }

    function getNextLesson() {
        const now = new Date();
        const currentTime = now.getHours() * 60 + now.getMinutes();
        const today = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'][now.getDay()];
        const future = lessonPlans.filter(l => l.day === today && (parseInt(l.startTime.split(':')[0])*60 + parseInt(l.startTime.split(':')[1])) > currentTime)
            .sort((a,b) => a.startTime.localeCompare(b.startTime));
        return future[0]?.className || null;
    }

    function getNextLessonAfter(current) {
        const [eh, em] = calculateEndTime(current.startTime, current.duration).split(':').map(Number);
        const end = eh * 60 + em;
        const future = lessonPlans.filter(l => l.day === current.day && (parseInt(l.startTime.split(':')[0])*60 + parseInt(l.startTime.split(':')[1])) > end)
            .sort((a,b) => a.startTime.localeCompare(b.startTime));
        return future[0] || null;
    }

    function isCurrentLesson(lesson) {
        const now = new Date();
        const currentTime = now.getHours() * 60 + now.getMinutes();
        const [h, m] = lesson.startTime.split(':').map(Number);
        const start = h * 60 + m;
        const end = start + lesson.duration;
        return currentTime >= start && currentTime < end;
    }

    function getTimeRemaining(lesson) {
        const now = new Date();
        const [h, m] = lesson.startTime.split(':').map(Number);
        const start = new Date(); start.setHours(h, m, 0, 0);
        if (now < start) { const diff = start - now; return `In ${Math.floor(diff / 60000)} min`; }
        const end = new Date(start.getTime() + lesson.duration * 60000);
        if (now < end) { const diff = end - now; return `${Math.floor(diff / 60000)} min left`; }
        return 'Finished';
    }

    function calculateEndTime(start, duration) {
        let [h, m] = start.split(':').map(Number);
        m += duration;
        while (m >= 60) { h++; m -= 60; }
        return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
    }

    function deleteLesson(id) {
        if (confirm('Delete this lesson?')) {
            lessonPlans = lessonPlans.filter(l => l.id !== id);
            localStorage.setItem('lessonPlans', JSON.stringify(lessonPlans));
            displaySchedule();
            updateCurrentLesson();
            showToast('Lesson deleted', 'success');
        }
    }

    function addLesson(e) {
        e.preventDefault();
        const classId = document.getElementById('lessonClass').value;
        const className = allClasses.find(c => c.id === classId)?.name;
        const newLesson = {
            id: `lp_${Date.now()}`,
            classId, className,
            day: document.getElementById('lessonDay').value,
            startTime: document.getElementById('lessonTime').value,
            duration: parseInt(document.getElementById('lessonDuration').value)
        };
        lessonPlans.push(newLesson);
        localStorage.setItem('lessonPlans', JSON.stringify(lessonPlans));
        closeModal('addLessonModal');
        displaySchedule();
        updateCurrentLesson();
        showToast('Lesson added', 'success');
        document.getElementById('addLessonForm').reset();
    }

    function handleFileUpload(e) {
        const file = e.target.files[0];
        if (!file) return;
        showToast(`File "${file.name}" selected. Parse feature coming soon.`, 'info');
    }

    function openFullSchedule() {
        const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
        let html = '';
        for (const day of days) {
            const lessons = lessonPlans.filter(l => l.day === day).sort((a,b) => a.startTime.localeCompare(b.startTime));
            html += `<h4 style="margin-top:16px; color:var(--accent-primary);">${day}</h4>
                <table class="schedule-table" style="margin-bottom:16px;">
                    <thead><tr><th>Time</th><th>Class</th><th>Duration</th><th>Action</th></tr></thead>
                    <tbody>${lessons.map(l => `<tr><td>${l.startTime}</td><td>${l.className}</td><td>${l.duration} min</td>
                        <td><button class="btn-icon" onclick="deleteLesson('${l.id}'); location.reload();"><i class="fas fa-trash"></i></button></td></tr>`).join('')}
                        ${lessons.length === 0 ? '<tr><td colspan="4">No lessons</td></tr>' : ''}
                    </tbody>
                </table>`;
        }
        document.getElementById('fullScheduleContent').innerHTML = html;
        openModal('fullScheduleModal');
    }

    function showToast(msg, type) {
        const toast = document.createElement('div');
        toast.style.cssText = `position:fixed; bottom:20px; right:20px; background:${type === 'success' ? '#10B981' : '#FF6600'}; color:white; padding:12px 20px; border-radius:8px; z-index:1000;`;
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    function checkAuth() {
        const token = localStorage.getItem('teacherToken');
        if (!token && !window.location.pathname.includes('index.html')) {
            window.location.href = 'index.html';
            return false;
        }
        const name = localStorage.getItem('teacherName');
        if (name) document.querySelectorAll('#teacherName').forEach(el => { if (el) el.textContent = name; });
        return true;
    }

    document.addEventListener('DOMContentLoaded', () => {
        if (!checkAuth()) return;
        loadData();
        document.getElementById('selectFileBtn')?.addEventListener('click', () => document.getElementById('fileInput').click());
        document.getElementById('fileInput')?.addEventListener('change', handleFileUpload);
        document.getElementById('viewFullScheduleBtn')?.addEventListener('click', openFullSchedule);
        document.querySelectorAll('.day-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentDay = tab.dataset.day;
                displaySchedule();
            });
        });
        document.getElementById('addLessonForm')?.addEventListener('submit', addLesson);
        document.getElementById('logoutBtn')?.addEventListener('click', () => { localStorage.clear(); window.location.href = 'index.html'; });
    });
    
    window.deleteLesson = deleteLesson;
    window.closeModal = closeModal;
    window.openModal = openModal;
</script>
</body>
</html>
