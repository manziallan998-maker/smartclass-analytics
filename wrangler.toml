# ============================================================================
#  WRANGLER CONFIGURATION - SMARTCLASS ANALYTICS v2.0
#  Professional Cloudflare Pages + Workers Configuration
# ============================================================================

name = "smartclass-analytics"
main = "functions/api.js"
compatibility_date = "2026-05-30"

# ============================================================================
#  NODE.JS COMPATIBILITY FLAGS
# ============================================================================
compatibility_flags = [
    "nodejs_compat",
    "streams_enable_constructors",
    "fetch_refuse_unknown_protocols"
]

# ============================================================================
#  ASSETS CONFIGURATION - Static files serving
# ============================================================================
[assets]
directory = "."
binding = "ASSETS"
not_found_handling = "404.html"

# ============================================================================
#  OBSERVABILITY - Monitoring & Logging
# ============================================================================
[observability]
enabled = true
head_sampling_rate = 1.0
tail_sampling_rate = 0.1

# ============================================================================
#  ENVIRONMENT VARIABLES
# ============================================================================
[vars]
ENVIRONMENT = "production"
APP_NAME = "SmartClass Analytics"
APP_VERSION = "2.0.0"
API_VERSION = "v1"
JWT_SECRET = "smartclass-super-secret-key-2026-change-in-production"
SESSION_TIMEOUT = "3600"
MAX_LOGIN_ATTEMPTS = "5"
RATE_LIMIT_REQUESTS = "100"
RATE_LIMIT_WINDOW = "60"

