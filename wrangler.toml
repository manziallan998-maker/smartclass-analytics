name = "smartclass-analytics"
main = "functions/api.js"
compatibility_date = "2026-05-30"

# Pages configuration
[pages]
  build_command = ""
  output_dir = "."

# Environment variables
[vars]
  ENVIRONMENT = "production"
  APP_VERSION = "2.0.0"

# Enable Node.js compatibility
compatibility_flags = ["nodejs_compat"]

# Assets configuration (static files)
[assets]
  directory = "."
  binding = "ASSETS"

# Routes configuration
[[routes]]
  pattern = "/api/*"
  script = "smartclass-analytics"

# Observability
[observability]
  enabled = true
  head_sampling_rate = 1.0
